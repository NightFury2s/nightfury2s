name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: NightFury2s

          base: header, activity, community, repositories

          plugin_followup: yes
          plugin_habits: yes
          plugin_isocalendar: yes
          plugin_languages: yes
